<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL ARSENAL | MASTERING EXTREMO</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #bunker { border: 3px solid #f00; padding: 30px; box-shadow: 0 0 15px #f00; display: inline-block; }
        h1 { text-shadow: 2px 2px #500; font-size: 2.5rem; }
        button { background: #f00; color: #000; font-weight: bold; padding: 15px 30px; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background: #fff; box-shadow: 0 0 20px #f00; }
        #controles { margin-top: 20px; display: none; }
        .pentagrama { position: fixed; bottom: 10px; right: 10px; color: #111; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎸 EL ARSENAL 🤘</h1>
    <div id="bunker">
        <h3>ALGORITMO MATA-TOSTADAS V1.0</h3>
        <input type="file" id="archivo" accept="audio/*"><br><br>
        <select id="genero" style="background:#222; color:#fff; padding:5px;">
            <option value="metal">DEATH / BLACK METAL</option>
            <option value="thrash">THRASH / SPEED</option>
            <option value="urbano">URBANO / CORE</option>
        </select><br><br>
        <button id="btn-detonar">¡DETONAR MASTERING! 💥</button>

        <div id="controles">
            <p>-- PROCESO COMPLETADO --</p>
            <audio id="reproductor" controls></audio><br><br>
            <p style="font-size: 0.8rem;">Escucha la diferencia con el poder del Arsenal</p>
        </div>
    </div>

    <div class="pentagrama" onclick="alert('BIENVENIDO JEFE ERICK. EL BÚNKER ES TUYO.')">⛧</div>

    <script>
        const btnDetonar = document.getElementById('btn-detonar');
        const archivoInput = document.getElementById('archivo');
        const reproductor = document.getElementById('reproductor');
        const controles = document.getElementById('controles');

        btnDetonar.onclick = async () => {
            if (!archivoInput.files[0]) return alert("Sube la rola, carnal.");
            
            alert("PROCESANDO CON ESTEROIDES... ESPERA EL CHINGADAZO.");
            
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const source = context.createBufferSource();
            const fileReader = new FileReader();

            fileReader.onload = async (e) => {
                const arrayBuffer = e.target.result;
                const audioBuffer = await context.decodeAudioData(arrayBuffer);
                
                // --- EL MOTOR DE GUERRA (Nodos de Audio) ---
                const compressor = context.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-20, context.currentTime); // El "Mata-Tostadas"
                compressor.knee.setValueAtTime(40, context.currentTime);
                compressor.ratio.setValueAtTime(12, context.currentTime);
                compressor.attack.setValueAtTime(0, context.currentTime);
                compressor.release.setValueAtTime(0.25, context.currentTime);

                const gainNode = context.createGain();
                gainNode.gain.setValueAtTime(1.8, context.currentTime); // ¡MÁS VOLUMEN!

                // Conectar todo
                source.buffer = audioBuffer;
                source.connect(compressor);
                compressor.connect(gainNode);
                gainNode.connect(context.destination);

                // Crear el preview para el usuario
                const dest = context.createMediaStreamDestination();
                gainNode.connect(dest);
                
                const mediaRecorder = new MediaRecorder(dest.stream);
                const chunks = [];
                mediaRecorder.ondataavailable = (evt) => chunks.push(evt.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    reproductor.src = URL.createObjectURL(blob);
                    controles.style.display = 'block';
                };

                mediaRecorder.start();
                source.start(0);
                
                // Procesamos solo 15 segundos para el preview rápido
                setTimeout(() => {
                    mediaRecorder.stop();
                    source.stop();
                    alert("¡LISTO! DALE PLAY Y SIENTE EL PODER.");
                }, 15000); 
            };
            fileReader.readAsArrayBuffer(archivoInput.files[0]);
        };
    </script>
</body>
</html>
