<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL ARSENAL | MASTERING DE GUERRA</title>
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            border: 10px solid #1a1a1a;
        }

        h1 { color: #ff0000; text-shadow: 3px 3px #550000; letter-spacing: 5px; font-size: 3rem; }
        
        #bunker {
            background: #111;
            border: 2px solid #ff0000;
            padding: 40px;
            box-shadow: 0 0 20px #ff0000;
            text-align: center;
            max-width: 500px;
        }

        select, input {
            background: #222;
            color: #fff;
            border: 1px solid #ff0000;
            padding: 10px;
            margin: 10px 0;
            width: 100%;
        }

        button {
            background: #ff0000;
            color: #000;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        button:hover { background: #fff; transform: scale(1.1); box-shadow: 0 0 30px #ff0000; }

        #guardián {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff0000;
            color: #000;
            z-index: 666;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: vibrar 0.1s infinite;
        }

        @keyframes vibrar {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(0deg); }
        }

        .pentagrama {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 2rem;
            color: #222;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="guardián">
        <h1>¡¡NO LO CREO!!</h1>
        <h2>ESA TARJETA NO ES DE ESTE BARRIO</h2>
        <p>NO SEAS PINCHE VATO MENDIGO Y PAGA LO QUE CORRESPONDE.</p>
        <button onclick="cerrarGuardián()">VOY A PAGAR BIEN</button>
    </div>

    <h1>EL ARSENAL</h1>
    
    <div id="bunker">
        <h3>ALGORITMO MATA-TOSTADAS ACTIVO</h3>
        <p>Selecciona el género de tu rola:</p>
        <select id="genero">
            <option value="death">DEATH METAL / BLACK</option>
            <option value="thrash">THRASH / SPEED</option>
            <option value="urbano">URBANO / CORE</option>
            <option value="punk">PUNK / GRUNGE</option>
        </select>
        
        <input type="file" id="audio-input" accept="audio/*">
        
        <button onclick="detonar()">¡DETONAR! 💥</button>
    </div>

    <div class="pentagrama" onclick="accesoVIP()">⛧</div>

    <script>
        function detonar() {
            // SIMULACIÓN DE DETECTOR DE MAÑOSOS (Aquí podrías usar una API de IP)
            // Por ahora, simulamos que si selecciona "Urbano" detectamos la VPN
            const archivo = document.getElementById('audio-input').files[0];
            if(!archivo) {
                alert("Sube una rola primero, no mames.");
                return;
            }

            // Aquí puedes poner una lógica real de IP, por ahora es un azar para prueba
            let esMañoso = Math.random() < 0.3; 

            if(esMañoso) {
                document.getElementById('guardián').style.display = 'flex';
                // Aquí sonaría el gutural "NO LO CREO"
            } else {
                alert("PROCESANDO " + archivo.name + " CON ESTEROIDES... \n\n¡ESPERA EL CHINGADAZO DE SONIDO!");
            }
        }

        function accesoVIP() {
            let pass = prompt("CÓDIGO DEL CAOS:");
            if(pass === "666") {
                alert("BIENVENIDO AL BÚNKER, JEFE ERICK. EL ARSENAL ES TUYO.");
            }
        }

        function cerrarGuardián() {
            document.getElementById('guardián').style.display = 'none';
        }
    </script>
</body>
  </html>
