<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL ARSENAL: LA METAMORFOSIS DEL ROCK</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #bunker { border: 3px solid #f00; padding: 20px; box-shadow: 0 0 25px #f00; display: inline-block; background: #050505; border-radius: 12px; max-width: 98%; }
        h1 { text-shadow: 3px 3px #800; font-size: 2.2rem; color: #f00; letter-spacing: 2px; margin-bottom: 5px; }
        h2 { color: #fff; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 20px; }
        
        /* EL GRITO GUTURAL DEL CADENERO */
        #cadenero-alerta { display: none; background: #f00; color: #fff; padding: 20px; border: 4px double #fff; margin-bottom: 20px; font-weight: bold; font-size: 1.3rem; }

        .precios { margin: 15px 0; font-size: 0.75rem; color: #0f0; border-collapse: collapse; width: 100%; text-align: center; }
        .precios th { color: #fff; text-transform: uppercase; border-bottom: 2px solid #f00; padding: 8px; background: #1a0000; }
        .precios td { border: 1px solid #222; padding: 10px; }
        
        /* BOTÓN DE PAGO */
        .btn-pago { background: #0f0; color: #000; padding: 18px; font-size: 1.1rem; font-weight: bold; text-decoration: none; display: block; margin: 20px auto; border-radius: 8px; border: 3px solid #fff; text-transform: uppercase; }
        .btn-pago:hover { background: #fff; box-shadow: 0 0 20px #0f0; }
        
        select { background: #000; color: #f00; border: 2px solid #f00; padding: 12px; font-weight: bold; width: 95%; margin-bottom: 15px; font-size: 0.9rem; }
        input[type="file"] { color: #fff; margin-bottom: 15px; }
        
        button { background: #f00; color: #000; font-weight: bold; padding: 18px 30px; border: none; cursor: pointer; border-radius: 5px; text-transform: uppercase; font-size: 1rem; }
        button:hover { background: #fff; box-shadow: 0 0 25px #f00; }
        button:disabled { background: #222 !important; color: #444 !important; cursor: not-allowed !important; box-shadow: none !important; }
        
        #descarga-zona { display: none; margin-top: 30px; border-top: 2px dashed #0f0; padding-top: 20px; }
        .btn-download { background: #0f0; color: #000; padding: 15px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

        <span style="font-size: 0.8rem;">VPN O UBICACIÓN FALSA DETECTADA. ACCESO AL MOTOR BLOQUEADO.</span>
    </div>
