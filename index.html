<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL ARSENAL 666</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; overflow-x: hidden; }
        
        /* LLAVE MAESTRA: Pentagrama dibujado con código (SVG) */
        #pentagrama-llave {
            position: fixed; bottom: 15px; right: 15px; width: 50px; height: 50px;
            cursor: pointer; opacity: 0.2; z-index: 1000; filter: drop-shadow(0 0 5px #f00);
        }
        #pentagrama-llave:hover { opacity: 1; }

        #bunker { 
            border: 3px solid #f00; padding: 20px; box-shadow: 0 0 25px #f00; 
            display: inline-block; background: #050505; border-radius: 12px; 
            max-width: 95%; margin-top: 10px; position: relative;
        }

        h1 { text-shadow: 3px 3px #800; font-size: 2rem; margin: 10px 0; }
        h2 { color: #fff; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

        .precios { margin: 15px 0; font-size: 0.85rem; color: #0f0; border-collapse: collapse; width: 100%; }
        .precios th { color: #fff; border-bottom: 2px solid #f00; padding: 8px; background: #1a0000; }
        .precios td { border: 1px solid #222; padding: 10px; }
        
        .btn-pago { background: #0f0; color: #000; padding: 18px; font-size: 1rem; font-weight: bold; text-decoration: none; display: block; margin: 20px auto; border-radius: 8px; border: 3px solid #fff; text-transform: uppercase; }
        
        #interfaz-motor { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        
        select { background: #000; color: #f00; border: 2px solid #f00; padding: 12px; font-weight: bold; width: 100%; margin-bottom: 15px; }
        input[type="file"] { color: #fff; margin-bottom: 20px; width: 100%; }
        
        button { background: #f00; color: #000; font-weight: bold; padding: 20px; border: none; cursor: pointer; border-radius: 5px; width: 100%; box-shadow: 0 6px #800; font-size: 1.1rem; }
        button:active { transform: translateY(4px); box-shadow: 0 2px #800; }

        #descarga-zona { display: none; margin-top: 30px; border-top: 3px dashed #0f0; padding-top: 20px; }
        .btn-download { background: #0f0; color: #000; padding: 15px; text-decoration: none; font-weight: bold; display: block; margin-top: 15px; border-radius: 5px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="pentagrama-llave" onclick="accesoMaestro()">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#f00" stroke-width="2"/>
            <path d="M50 5 L63 38 L95 38 L69 59 L79 92 L50 72 L21 92 L31 59 L5 38 L37 38 Z" fill="none" stroke="#f00" stroke-width="2"/>
        </svg>
    </div>

    <div id="bunker">
        <h1>🎸 EL ARSENAL 🤘</h1>
        <h2>EL HORNO DE LA METAMORFOSIS</h2>

        <table class="precios">
            <tr><th>PRODUCCIÓN</th><th>MÉXICO</th><th>GLOBAL (USD)</th></tr>
            <tr><td>1 Song</td><td>$100</td><td>$20</td></tr>
            <tr style="color: #ff0; font-weight: bold;"><td>8 Songs (LP)</td><td>$500</td><td>$95</td></tr>
        </table>

        <a href="https://link.mercadopago.com.mx/elarsenalerick" target="_blank" class="btn-pago">💰 1. PAGA AQUÍ / PAY HERE</a>

        <div id="interfaz-motor">
            <p style="color: #ccc; font-size: 0.9rem;">2. Sube tu track (.mp3, .wav):</p>
            <input type="file" id="archivo" accept="audio/*">
            
            <select id="genero">
                <option value="death">MODO: DEATH METAL (MURO DE SONIDO)</option>
                <option value="urbano">MODO: ROCK URBANO / PUNK</option>
                <option value="comercial">MODO: TRAP / REGGAETON / SALSA</option>
            </select>

            <button id="btn-detonar">¡DETONAR METAMORFOSIS! 💥</button>
        </div>

        <div id="descarga-zona">
            <h3 style="color: #0f0;">¡MASTERIZACIÓN LISTA!</h3>
            <audio id="reproductor" controls style="width:100%;"></audio>
            <a id="link-descarga" class="btn-download">📥 DESCARGAR MÁSTER FINAL</a>
        </div>
    </div>

    <script>
        // LLAVE MAESTRA
        function accesoMaestro() {
            const clave = prompt("DI LAS PALABRAS MALDITAS:");
            if (clave && (clave.toLowerCase() === "ábreme esta m***** 666" || clave.toLowerCase() === "abreme esta mierda 666")) {
                alert("BIENVENIDO AL BÚNKER, MAESTRO.");
            } else {
                alert("LÁRGATE, PINCHE POSER.");
            }
        }

        const btnDetonar = document.getElementById('btn-detonar');
        
        btnDetonar.onclick = async () => {
            const fileInput = document.getElementById('archivo');
            if (!fileInput.files[0]) {
                alert("¡Mete la rola al horno primero!");
                return;
            }

            alert("COCINANDO TU ROLA... NO CIERRES LA PÁGINA.");

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const reader = new FileReader();

            reader.onload = async (e) => {
                const arrayBuffer = e.target.result;
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;

                // --- CADENA DE SONIDO PROFESIONAL ---
                const eq = audioCtx.createBiquadFilter();
                eq.type = "highshelf";
                eq.frequency.value = 5000;
                eq.gain.value = 8; // Brillo sin reventar oídos

                const comp = audioCtx.createDynamicsCompressor();
                comp.threshold.value = -15;
                comp.knee.value = 40; // Suavizado para evitar el "gis"
                comp.ratio.value = 12;
                comp.attack.value = 0.003;
                comp.release.value = 0.25;

                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 2.8; // Volumen comercial potente

                // Conexión
                source.connect(eq);
                eq.connect(comp);
                comp.connect(gainNode);

                // Grabación interna
                const dest = audioCtx.createMediaStreamDestination();
                gainNode.connect(dest);
                const recorder = new MediaRecorder(dest.stream);
                const chunks = [];

                recorder.ondataavailable = (evt) => chunks.push(evt.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('reproductor').src = url;
                    document.getElementById('link-descarga').href = url;
                    document.getElementById('link-descarga').download = "El_Arsenal_Master_Final.mp3";
                    document.getElementById('descarga-zona').style.display = 'block';
                    alert("¡HORNO LISTO! Ya puedes descargar.");
                };

                recorder.start();
                source.start(0);
                source.onended = () => recorder.stop();
            };
            
            reader.readAsArrayBuffer(fileInput.files[0]);
        };
    </script>
</body>
</html>
